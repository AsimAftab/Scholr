<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background with padding for maskable safe zone -->
  <rect width="512" height="512" fill="#18181b" rx="96"/>

  <!-- Safe zone: center 80% (approximately 410x410px) -->
  <!-- All content positioned within safe area with 51px padding on all sides -->
  <g>
    <!-- Large S - centered and sized for safe zone -->
    <text x="256" y="240"
          dominant-baseline="central"
          text-anchor="middle"
          font-family="system-ui, -apple-system, sans-serif"
          font-size="200"
          font-weight="700"
          fill="#ffffff">S</text>

    <!-- "cholr" text - positioned lower but within safe zone -->
    <text x="256" y="350"
          font-family="system-ui, -apple-system, sans-serif"
          font-size="70"
          font-weight="600"
          fill="#a1a1aa"
          text-anchor="middle">cholr</text>
  </g>
</svg>
