services:
  postgres:
    image: postgres:16-alpine
    container_name: scholr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: scholr
      POSTGRES_USER: scholr
      POSTGRES_PASSWORD: scholr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scholr -d scholr"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: scholr-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: development
      DEBUG: "true"
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+psycopg://scholr:scholr@postgres:5432/scholr
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      CORS_ORIGINS: http://localhost:3000
      SESSION_SECRET: ${SESSION_SECRET:-change-me-dev-secret}
      SESSION_COOKIE_NAME: scholr_session
      SESSION_COOKIE_SECURE: "false"
      AUTO_SEED: "true"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready')"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
    container_name: scholr-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"

volumes:
  postgres_data:
